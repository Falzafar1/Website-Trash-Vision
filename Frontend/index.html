<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trash Vision — Waste Monitoring System</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="header-brand">
      <div class="header-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12.5" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3 2"/>
          <circle cx="14" cy="14" r="4" fill="#4ade80"/>
          <line x1="14" y1="4" x2="14" y2="9" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <line x1="14" y1="19" x2="14" y2="24" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="14" x2="9" y2="14" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <line x1="19" y1="14" x2="24" y2="14" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <circle cx="7" cy="7" r="2.5" fill="#e8690a"/>
          <circle cx="21" cy="7" r="2.5" fill="#e8690a"/>
          <circle cx="7" cy="21" r="2.5" fill="#e8690a"/>
          <circle cx="21" cy="21" r="2.5" fill="#e8690a"/>
          <path d="M7 7 L14 10 L21 7" stroke="#86efac" stroke-width="0.8" fill="none" opacity="0.6"/>
          <path d="M7 21 L14 18 L21 21" stroke="#86efac" stroke-width="0.8" fill="none" opacity="0.6"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>TRASH <span>VISION</span></h1>
        <p>Waste Monitoring System Berbasis Drone</p>
      </div>
    </div>
    <div class="header-right">
      <div class="pill pill-drone">
        <div class="pill-dot" style="background:#facc15"></div>
        Drone Online
      </div>
      <div class="pill pill-gps">
        <div class="pill-dot" style="background:#60a5fa"></div>
        GPS Active
      </div>
      <span class="badge-status badge-offline" id="status-badge">● Memuat</span>
    </div>
  </header>

  <div id="stats-bar">

    <div class="stat-card sc-orange">
      <div class="stat-icon-box sib-orange">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 22C12 22 4 15 4 9a8 8 0 0116 0c0 6-8 13-8 13Z" stroke="#ea580c" stroke-width="1.8" stroke-linejoin="round"/>
          <circle cx="12" cy="9" r="3" stroke="#ea580c" stroke-width="1.8"/>
        </svg>
      </div>
      <span class="stat-number" id="total-locations">–</span>
      <span class="stat-label">Total Lokasi</span>
    </div>

    <div class="stat-card sc-blue">
      <div class="stat-icon-box sib-blue">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M9 3h6v2l1.5 2v11a1.5 1.5 0 01-1.5 1.5h-6A1.5 1.5 0 017 18V7L8.5 5V3z" stroke="#2563eb" stroke-width="1.7" stroke-linejoin="round"/>
          <path d="M7 10h10" stroke="#2563eb" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M9 3h6" stroke="#2563eb" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M10 13.5 Q12 15 14 13.5" stroke="#2563eb" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="stat-number" id="total-bottles">–</span>
      <span class="stat-label">Botol Plastik</span>
    </div>

    <div class="stat-card sc-purple">
      <div class="stat-icon-box sib-purple">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <ellipse cx="12" cy="5.5" rx="5" ry="2" stroke="#a855f7" stroke-width="1.7"/>
          <path d="M7 5.5v13c0 1.1 2.24 2 5 2s5-.9 5-2v-13" stroke="#a855f7" stroke-width="1.7"/>
          <ellipse cx="12" cy="18.5" rx="5" ry="2" stroke="#a855f7" stroke-width="1.7"/>
          <path d="M7 11h10" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M17 7.5 Q19 9 18.5 11" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="stat-number" id="total-cans">–</span>
      <span class="stat-label">Kaleng</span>
    </div>

    <div class="stat-card sc-green">
      <div class="stat-icon-box sib-green">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 3C12 3 20 6 20 13C20 17 16 20 12 20C8 20 4 17 4 13C4 6 12 3 12 3Z" stroke="#16a34a" stroke-width="1.7" stroke-linejoin="round"/>
          <path d="M12 20L12 22" stroke="#16a34a" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M12 3 Q10 10 8 14" stroke="#16a34a" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <path d="M12 3 Q14 9 17 13" stroke="#16a34a" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6"/>
        </svg>
      </div>
      <span class="stat-number" id="total-leaf">–</span>
      <span class="stat-label">Tumpukan Daun</span>
    </div>

    <div class="stat-card sc-amber">
      <div class="stat-icon-box sib-amber">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="6" width="18" height="14" rx="2" stroke="#ca8a04" stroke-width="1.7"/>
          <path d="M3 10h18" stroke="#ca8a04" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M8 6V4h8v2" stroke="#ca8a04" stroke-width="1.7" stroke-linejoin="round"/>
          <path d="M8 14h8M8 17h5" stroke="#ca8a04" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="stat-number" id="total-mixed">–</span>
      <span class="stat-label">Luas Area Sampah</span>
    </div>

  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
